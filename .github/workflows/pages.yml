name: Deploy GitHub Trending Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape today's trending repositories
        run: npm run scrape
        env:
          APP_TIMEZONE: Asia/Seoul
          TRENDING_SINCE: daily

      - name: Commit trending snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/trending.json data/history
          if git diff --cached --quiet; then
            echo "No trending data changes to commit."
          else
            git commit -m "Update trending data [skip ci]"
            git push
          fi

      - name: Build static site
        run: npm run build:static

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
